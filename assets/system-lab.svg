<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">PREMXAI Systems Lab terminal</title>
  <desc id="desc">Animated terminal introducing Prem's agent infrastructure, frozen-web search, discovery, and generative-agent research projects.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#38bdf8" stroke-opacity="0.07"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family: Consolas, "Courier New", monospace; }
      .line { opacity: 0; animation: reveal 8s infinite; }
      .l1 { animation-delay: .4s; }
      .l2 { animation-delay: 1.2s; }
      .l3 { animation-delay: 2s; }
      .l4 { animation-delay: 2.8s; }
      .l5 { animation-delay: 3.6s; }
      .status { opacity: 0; animation: status 8s infinite 4.5s; }
      .cursor { animation: blink .8s steps(1) infinite; }
      .scan { animation: scan 5s linear infinite; }
      @keyframes reveal { 0%, 4% { opacity: 0; transform: translateY(5px); } 10%, 84% { opacity: 1; transform: translateY(0); } 94%, 100% { opacity: 0; } }
      @keyframes status { 0%, 5% { opacity: 0; } 12%, 78% { opacity: 1; } 90%, 100% { opacity: 0; } }
      @keyframes blink { 0%, 48% { opacity: 1; } 49%, 100% { opacity: 0; } }
      @keyframes scan { from { transform: translateY(-20px); } to { transform: translateY(380px); } }
    </style>
  </defs>

  <rect width="1000" height="360" rx="12" fill="url(#panel)"/>
  <rect width="1000" height="360" rx="12" fill="url(#grid)"/>
  <rect x="1" y="1" width="998" height="358" rx="11" fill="none" stroke="#38bdf8" stroke-opacity="0.35"/>

  <circle cx="26" cy="24" r="5" fill="#fb7185"/>
  <circle cx="45" cy="24" r="5" fill="#facc15"/>
  <circle cx="64" cy="24" r="5" fill="#4ade80"/>
  <text x="500" y="29" text-anchor="middle" class="mono" font-size="13" fill="#94a3b8">PREMXAI // SYSTEMS LAB</text>
  <line x1="0" y1="45" x2="1000" y2="45" stroke="#38bdf8" stroke-opacity="0.25"/>

  <text x="42" y="82" class="mono" font-size="17" fill="#4ade80" filter="url(#glow)">&gt; boot evidence-first-ai</text>

  <g class="mono" font-size="19">
    <g class="line l1"><text x="64" y="125" fill="#38bdf8">[01] KERNA</text><text x="250" y="125" fill="#cbd5e1">agents get boundaries</text></g>
    <g class="line l2"><text x="64" y="165" fill="#38bdf8">[02] CRYO</text><text x="250" y="165" fill="#cbd5e1">retrieval gets provenance</text></g>
    <g class="line l3"><text x="64" y="205" fill="#38bdf8">[03] NORI</text><text x="250" y="205" fill="#cbd5e1">discovery gets ranked</text></g>
    <g class="line l4"><text x="64" y="245" fill="#38bdf8">[04] EMOTION</text><text x="250" y="245" fill="#cbd5e1">research gets ablations</text></g>
    <g class="line l5"><text x="64" y="285" fill="#facc15">[OK] RECEIPTS</text><text x="250" y="285" fill="#cbd5e1">latency | cost | quality | failure modes</text></g>
  </g>

  <g class="status mono">
    <rect x="42" y="310" width="916" height="28" rx="4" fill="#4ade80" fill-opacity="0.08" stroke="#4ade80" stroke-opacity="0.35"/>
    <text x="58" y="330" font-size="15" fill="#4ade80">STATUS: OPEN TO RELOCATION // READY TO BUILD</text>
    <rect class="cursor" x="477" y="316" width="9" height="16" fill="#4ade80"/>
  </g>

  <rect class="scan" x="0" y="0" width="1000" height="2" fill="#38bdf8" opacity="0.18"/>
</svg>
