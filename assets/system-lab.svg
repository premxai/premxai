<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
  <title id="title">AI systems and gradient descent</title>
  <desc id="desc">An animated optimization path descends through a loss landscape toward a measured minimum.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08101c"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#171224"/>
    </linearGradient>
    <radialGradient id="minimum" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .sans { font-family: Inter, Arial, sans-serif; }
      .mono { font-family: Consolas, "Courier New", monospace; }
      .contour { fill: none; stroke-width: 1.4; animation: breathe 5s ease-in-out infinite; transform-origin: 730px 180px; }
      .c2 { animation-delay: -.7s; }
      .c3 { animation-delay: -1.4s; }
      .c4 { animation-delay: -2.1s; }
      .c5 { animation-delay: -2.8s; }
      .path { stroke-dasharray: 8 8; animation: flow 2.2s linear infinite; }
      .pulse { animation: pulse 2s ease-out infinite; transform-origin: 730px 193px; }
      .metric { opacity: .55; animation: metrics 6s ease-in-out infinite; }
      .m2 { animation-delay: -2s; }
      .m3 { animation-delay: -4s; }
      @keyframes breathe { 0%, 100% { opacity: .45; transform: scale(1); } 50% { opacity: .8; transform: scale(1.018); } }
      @keyframes flow { to { stroke-dashoffset: -32; } }
      @keyframes pulse { 0% { opacity: .9; transform: scale(.35); } 80%, 100% { opacity: 0; transform: scale(2.4); } }
      @keyframes metrics { 0%, 100% { opacity: .35; } 50% { opacity: .9; } }
    </style>
  </defs>

  <rect width="1000" height="360" rx="14" fill="url(#background)"/>
  <rect x="1" y="1" width="998" height="358" rx="13" fill="none" stroke="#94a3b8" stroke-opacity="0.16"/>

  <g class="sans">
    <text x="54" y="76" font-size="13" font-weight="700" letter-spacing="3" fill="#38bdf8">PREM BABU KANAPARTHI</text>
    <text x="52" y="127" font-size="40" font-weight="650" fill="#f8fafc">AI / ML systems</text>
    <text x="54" y="160" font-size="18" fill="#94a3b8">built around measurable behavior</text>

    <text x="54" y="220" class="mono" font-size="16" fill="#cbd5e1">minimize(</text>
    <text x="145" y="220" class="mono" font-size="16" fill="#fb7185">loss</text>
    <text x="183" y="220" class="mono" font-size="16" fill="#64748b"> + </text>
    <text x="211" y="220" class="mono" font-size="16" fill="#38bdf8">latency</text>
    <text x="278" y="220" class="mono" font-size="16" fill="#64748b"> + </text>
    <text x="306" y="220" class="mono" font-size="16" fill="#facc15">cost</text>
    <text x="344" y="220" class="mono" font-size="16" fill="#64748b"> + </text>
    <text x="372" y="220" class="mono" font-size="16" fill="#c084fc">uncertainty</text>
    <text x="468" y="220" class="mono" font-size="16" fill="#cbd5e1">)</text>

    <line x1="54" y1="252" x2="474" y2="252" stroke="#64748b" stroke-opacity="0.35"/>
    <text class="metric" x="54" y="281" font-size="13" font-weight="600" letter-spacing="1.2" fill="#4ade80">INFERENCE</text>
    <text class="metric m2" x="164" y="281" font-size="13" font-weight="600" letter-spacing="1.2" fill="#38bdf8">RETRIEVAL</text>
    <text class="metric m3" x="276" y="281" font-size="13" font-weight="600" letter-spacing="1.2" fill="#c084fc">AGENTS</text>
    <text class="metric" x="366" y="281" font-size="13" font-weight="600" letter-spacing="1.2" fill="#facc15">EVALUATION</text>
    <text x="54" y="321" class="mono" font-size="13" fill="#64748b">observe -&gt; measure -&gt; update -&gt; repeat</text>
  </g>

  <g transform="rotate(-10 730 180)">
    <ellipse class="contour" cx="730" cy="180" rx="232" ry="135" stroke="#fb7185" stroke-opacity="0.4"/>
    <ellipse class="contour c2" cx="730" cy="183" rx="185" ry="104" stroke="#c084fc" stroke-opacity="0.48"/>
    <ellipse class="contour c3" cx="730" cy="187" rx="139" ry="76" stroke="#38bdf8" stroke-opacity="0.58"/>
    <ellipse class="contour c4" cx="730" cy="190" rx="95" ry="50" stroke="#22d3ee" stroke-opacity="0.68"/>
    <ellipse class="contour c5" cx="730" cy="193" rx="52" ry="25" stroke="#4ade80" stroke-opacity="0.8"/>
  </g>

  <circle cx="730" cy="193" r="82" fill="url(#minimum)"/>
  <circle class="pulse" cx="730" cy="193" r="18" fill="none" stroke="#4ade80" stroke-width="2"/>
  <circle cx="730" cy="193" r="5" fill="#4ade80" filter="url(#glow)"/>

  <path id="descent" class="path" d="M 936 73 C 875 85, 910 126, 850 132 S 827 180, 784 166 S 770 208, 730 193" fill="none" stroke="#f8fafc" stroke-width="2" stroke-opacity="0.8"/>
  <circle r="6" fill="#f8fafc" filter="url(#glow)">
    <animateMotion dur="5.5s" repeatCount="indefinite" rotate="auto" path="M 936 73 C 875 85, 910 126, 850 132 S 827 180, 784 166 S 770 208, 730 193"/>
  </circle>

  <g class="mono" font-size="11" fill="#94a3b8">
    <text x="900" y="56">initialize</text>
    <text x="819" y="118">gradient</text>
    <text x="748" y="226" fill="#4ade80">measured minimum</text>
  </g>
</svg>
